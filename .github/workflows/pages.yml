name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.ACTIONS_PAT || github.token }}

      - name: Install dependencies
        run: |
          ruby --version
          GEM_USER_DIR="$(ruby -e 'print Gem.user_dir')"
          export PATH="$GEM_USER_DIR/bin:$PATH"
          echo "$GEM_USER_DIR/bin" >> "$GITHUB_PATH"
          if ! command -v bundle >/dev/null 2>&1; then
            gem install bundler --user-install --no-document
          fi
          bundle --version
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: resourceful-workshop/ethics-for-nlp-2026
        run: bundle exec jekyll build --source . --destination _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4